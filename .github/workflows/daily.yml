name: daily

on:
  schedule:
    # 13:30 UTC = 06:30 PT during PDT (Mar–Nov), 05:30 PT during PST (Nov–Mar).
    # See README "Schedule drift" for why we don't bother adjusting.
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install ffmpeg
        run: |
          if command -v ffmpeg >/dev/null 2>&1 && command -v ffprobe >/dev/null 2>&1; then
            ffmpeg -version | sed -n '1p'
            ffprobe -version | sed -n '1p'
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SCRIPT_MODEL: ${{ vars.OPENROUTER_SCRIPT_MODEL }}
          OPENROUTER_SCRIPT_TIMEOUT_MS: ${{ vars.OPENROUTER_SCRIPT_TIMEOUT_MS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FEED_BASE_URL: ${{ vars.FEED_BASE_URL }}
          EPISODE_TIME_ZONE: ${{ vars.EPISODE_TIME_ZONE }}
          TTS_MODEL: ${{ vars.TTS_MODEL }}
          TTS_VOICE: ${{ vars.TTS_VOICE }}
          TTS_ANCHOR_VOICE: ${{ vars.TTS_ANCHOR_VOICE }}
          TTS_ANALYST_VOICE: ${{ vars.TTS_ANALYST_VOICE }}
          TTS_TIMEOUT_MS: ${{ vars.TTS_TIMEOUT_MS }}
          AUDIO_CUES_ENABLED: ${{ vars.AUDIO_CUES_ENABLED }}
          AUDIO_CUE_STYLE: ${{ vars.AUDIO_CUE_STYLE }}
          PODCAST_AUTHOR: ${{ vars.PODCAST_AUTHOR }}
          PODCAST_SUMMARY: ${{ vars.PODCAST_SUMMARY }}
          PODCAST_OWNER_NAME: ${{ vars.PODCAST_OWNER_NAME }}
          PODCAST_OWNER_EMAIL: ${{ vars.PODCAST_OWNER_EMAIL }}
          PODCAST_HOST_NAME: ${{ vars.PODCAST_HOST_NAME }}
          PODCAST_LOCKED: ${{ vars.PODCAST_LOCKED }}
          PODCAST_IMAGE_URL: ${{ vars.PODCAST_IMAGE_URL }}
          PODCAST_CATEGORIES: ${{ vars.PODCAST_CATEGORIES }}
          PODCAST_EXPLICIT: ${{ vars.PODCAST_EXPLICIT }}
          PODCAST_TYPE: ${{ vars.PODCAST_TYPE }}
        run: npx tsx src/index.ts

      - name: Commit episode
        env:
          EPISODE_TIME_ZONE: ${{ vars.EPISODE_TIME_ZONE }}
          DAILY_PUSH_DEPLOY_KEY: ${{ secrets.DAILY_PUSH_DEPLOY_KEY }}
        run: |
          if [ -z "$(git status --porcelain docs/)" ]; then
            echo "No docs/ changes — skipping commit."
            exit 0
          fi

          deploy_key="$(mktemp)"
          trap 'rm -f "$deploy_key"' EXIT
          printf '%s\n' "$DAILY_PUSH_DEPLOY_KEY" > "$deploy_key"
          chmod 600 "$deploy_key"

          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add docs/
          git commit -m "Episode $(TZ="${EPISODE_TIME_ZONE:-America/Los_Angeles}" date +%Y-%m-%d)"
          GIT_SSH_COMMAND="ssh -i $deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            git push "git@github.com:${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
